name: Build Docker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker compose build
        run: docker compose build
